<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slides Editor</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1a2e;
    --surface: #222240;
    --surface-hover: #2a2a50;
    --border: #333360;
    --text: #e0e0f0;
    --text-dim: #8888aa;
    --accent: #6c63ff;
    --accent-hover: #7b73ff;
    --danger: #e74c3c;
    --success: #2ecc71;
    --warning: #f39c12;
    --radius: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Top bar ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.6rem 1rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .toolbar h1 {
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    opacity: 0.7;
    margin-right: auto;
  }
  .toolbar .filename {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-right: auto;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .toolbar .filename.unsaved::after {
    content: ' (unsaved)';
    color: var(--warning);
  }

  button {
    background: var(--surface-hover);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0.4rem 0.85rem;
    border-radius: var(--radius);
    font-size: 0.8rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: var(--accent); border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); }
  button.primary:hover { background: var(--accent-hover); }
  button.danger { color: var(--danger); }
  button.danger:hover { background: var(--danger); color: white; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Main layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Slide sidebar ── */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 0.6rem 0.8rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .slide-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem;
  }
  .slide-thumb {
    position: relative;
    border: 2px solid transparent;
    border-radius: var(--radius);
    margin-bottom: 0.5rem;
    cursor: pointer;
    overflow: hidden;
    background: #000;
    aspect-ratio: 16/9;
    transition: border-color 0.15s;
  }
  .slide-thumb:hover { border-color: var(--border); }
  .slide-thumb.active { border-color: var(--accent); }
  .slide-thumb iframe {
    width: 1280px;
    height: 720px;
    transform-origin: 0 0;
    pointer-events: none;
    border: none;
  }
  .slide-thumb .label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.75);
    padding: 0.2rem 0.5rem;
    font-size: 0.65rem;
    color: var(--text-dim);
  }
  .slide-thumb .slide-actions {
    position: absolute;
    top: 4px;
    right: 4px;
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .slide-thumb:hover .slide-actions { opacity: 1; }
  .slide-actions button {
    padding: 2px 5px;
    font-size: 0.65rem;
    border-radius: 4px;
    background: rgba(0,0,0,0.7);
    border: none;
  }

  /* ── Editor panel ── */
  .editor-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .editor-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 1.2rem;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    gap: 1rem;
  }
  .empty-state p { font-size: 0.9rem; }

  /* ── Editor fields ── */
  .field-group {
    margin-bottom: 1.2rem;
  }
  .field-group label {
    display: block;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 0.35rem;
  }
  .field-group input,
  .field-group textarea,
  .field-group select {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.5rem 0.7rem;
    font-size: 0.85rem;
    font-family: inherit;
    resize: vertical;
  }
  .field-group input:focus,
  .field-group textarea:focus,
  .field-group select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .field-group textarea { min-height: 60px; }

  .item-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.8rem;
    margin-bottom: 0.6rem;
  }
  .item-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.5rem;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-dim);
  }

  .section-header {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.6rem;
    padding-bottom: 0.3rem;
    border-bottom: 1px solid var(--border);
  }

  /* ── Preview ── */
  .preview-section {
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .preview-toggle {
    padding: 0.4rem 1rem;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-dim);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border: none;
    background: var(--surface);
    width: 100%;
    text-align: left;
  }
  .preview-toggle:hover { color: var(--text); background: var(--surface); }
  .preview-frame-wrap {
    height: 300px;
    background: #000;
    overflow: hidden;
    position: relative;
  }
  .preview-frame-wrap iframe {
    width: 1280px;
    height: 720px;
    transform-origin: 0 0;
    border: none;
  }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    min-width: 400px;
    max-width: 500px;
  }
  .modal h2 {
    font-size: 1rem;
    margin-bottom: 1rem;
  }
  .file-item {
    padding: 0.6rem 0.8rem;
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.85rem;
    transition: background 0.1s;
  }
  .file-item:hover { background: var(--surface-hover); }
  .file-item .date { font-size: 0.7rem; color: var(--text-dim); }

  /* ── File browser ── */
  .browser-path {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.5rem 0;
    margin-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .browser-path input {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.4rem 0.6rem;
    font-size: 0.8rem;
    font-family: monospace;
    min-width: 200px;
  }
  .browser-path input:focus { outline: none; border-color: var(--accent); }
  .dir-item {
    padding: 0.45rem 0.8rem;
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.82rem;
    transition: background 0.1s;
    color: var(--text-dim);
  }
  .dir-item:hover { background: var(--surface-hover); color: var(--text); }
  .dir-item .icon { font-size: 1rem; opacity: 0.7; }
  .browser-section-label {
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    padding: 0.6rem 0.4rem 0.2rem;
  }
  .browser-list {
    max-height: 400px;
    overflow-y: auto;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--success);
    color: #fff;
    padding: 0.6rem 1.2rem;
    border-radius: var(--radius);
    font-size: 0.85rem;
    font-weight: 500;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    z-index: 2000;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: var(--danger); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Palette swatches ── */
  .palette-option {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.7rem 0.8rem;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.15s;
  }
  .palette-option:hover { background: var(--surface-hover); }
  .palette-swatches { display: flex; gap: 4px; }
  .palette-swatch {
    width: 28px;
    height: 28px;
    border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.12);
  }
  .palette-name { font-size: 0.85rem; font-weight: 500; }
  .palette-desc { font-size: 0.7rem; color: var(--text-dim); }

  /* ── Layout selector ── */
  .layout-selector {
    display: flex;
    gap: 0.6rem;
    overflow-x: auto;
    padding-bottom: 0.8rem;
    margin-bottom: 1.2rem;
  }
  .layout-option {
    flex-shrink: 0;
    width: 100px;
    cursor: pointer;
    border: 2px solid transparent;
    border-radius: var(--radius);
    padding: 0.4rem;
    transition: border-color 0.15s, background 0.15s;
    text-align: center;
  }
  .layout-option:hover { border-color: var(--border); background: var(--surface-hover); }
  .layout-option.active { border-color: var(--accent); background: var(--surface-hover); }
  .layout-preview {
    aspect-ratio: 16/9;
    background: var(--bg);
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 0.3rem;
  }
  .layout-preview svg { width: 100%; height: 100%; }
  .layout-name { font-size: 0.62rem; font-weight: 600; color: var(--text-dim); line-height: 1.2; }

  /* ── Print ── */
  @media print {
    .toolbar, .sidebar, .editor-panel, .modal-overlay, .toast,
    #printContainer { display: none !important; }
    body { overflow: visible; height: auto; background: white; }
    .main { display: none !important; }
  }
</style>
</head>
<body>

<!-- Top toolbar -->
<div class="toolbar">
  <h1>Slides Editor</h1>
  <span class="filename" id="filename">No file open</span>
  <button onclick="newDeck()">New</button>
  <button onclick="openFileModal()">Open</button>
  <button onclick="saveFile()" id="btnSave" disabled>Save</button>
  <button onclick="saveAsFile()" id="btnSaveAs" disabled>Save As</button>
  <button onclick="addSlide()" id="btnAdd" disabled>+ Slide</button>
  <button onclick="printDeck()" id="btnPrint" disabled>Print</button>
  <button onclick="openPaletteModal()" id="btnPalette" disabled>Palette</button>
  <span id="logoControls" style="display:none; margin-left:0.5rem; align-items:center; gap:0.4rem;">
    <label style="font-size:0.7rem; font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.04em;">Logo:</label>
    <input type="text" id="deckLogoInput" style="width:160px; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:var(--radius); padding:0.3rem 0.5rem; font-size:0.75rem;" placeholder="logo-url.png" onchange="setDeckLogo(this.value)">
    <button onclick="applyLogoToAll()" title="Apply logo to all slides" style="font-size:0.7rem;">Apply All</button>
    <button class="danger" onclick="removeDeckLogo()" title="Remove logo from all slides" style="font-size:0.7rem; padding:0.3rem 0.5rem;">&times;</button>
  </span>
</div>

<!-- Main layout -->
<div class="main">
  <!-- Sidebar: slide list -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span>Slides</span>
      <span id="slideCount"></span>
    </div>
    <div class="slide-list" id="slideList"></div>
  </div>

  <!-- Editor panel -->
  <div class="editor-panel">
    <div class="editor-scroll" id="editorScroll">
      <div class="empty-state" id="emptyState">
        <p>Open an HTML slides file to start editing</p>
        <button class="primary" onclick="openFileModal()">Open File</button>
      </div>
      <div id="editorContent" style="display:none;"></div>
    </div>

    <!-- Preview -->
    <div class="preview-section" id="previewSection" style="display:none;">
      <button class="preview-toggle" onclick="togglePreview()">
        Preview ▾
      </button>
      <div class="preview-frame-wrap" id="previewWrap">
        <iframe id="previewFrame"></iframe>
      </div>
    </div>
  </div>
</div>

<!-- Open file modal -->
<div class="modal-overlay hidden" id="openModal">
  <div class="modal" style="min-width:500px;max-width:600px;">
    <h2>Open Slide Deck</h2>
    <div class="browser-path">
      <input type="text" id="browserPathInput" placeholder="/path/to/directory"
             onkeydown="if(event.key==='Enter')browseTo(this.value)">
      <button onclick="browseTo(document.getElementById('browserPathInput').value)">Go</button>
    </div>
    <div class="browser-list" id="browserList">Loading...</div>
    <div style="margin-top:1rem; text-align:right;">
      <button onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Save As modal -->
<div class="modal-overlay hidden" id="saveAsModal">
  <div class="modal">
    <h2>Save As</h2>
    <div class="field-group">
      <label>Filename</label>
      <input type="text" id="saveAsName" placeholder="my-slides.html">
    </div>
    <div style="margin-top:1rem; display:flex; gap:0.5rem; justify-content:flex-end;">
      <button onclick="closeSaveAsModal()">Cancel</button>
      <button class="primary" onclick="confirmSaveAs()">Save</button>
    </div>
  </div>
</div>

<!-- Palette modal -->
<div class="modal-overlay hidden" id="paletteModal">
  <div class="modal" style="min-width:500px;max-width:550px;">
    <h2>Color Palette</h2>
    <div id="paletteList" style="max-height:400px;overflow-y:auto;"></div>
    <div style="margin-top:1rem; text-align:right;">
      <button onclick="closePaletteModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── State ───
let currentFile = null;
let rawHtml = '';
let headContent = '';
let styleContent = '';
let scriptContent = '';
let slides = [];       // array of slide HTML strings (outer div included)
let selectedSlide = -1;
let dirty = false;
let deckLogo = '';     // deck-level logo URL (auto-detected or user-set)

// ─── API helpers ───
async function api(method, url, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(url, opts);
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      return { error: data.error || `Server error (${res.status})` };
    }
    return await res.json();
  } catch (err) {
    return { error: `Network error: ${err.message}` };
  }
}

function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => el.className = 'toast', 2500);
}

// ─── File operations ───
let currentBrowserDir = '';

async function openFileModal() {
  if (dirty && !confirm('You have unsaved changes. Open a different file anyway?')) return;
  document.getElementById('openModal').classList.remove('hidden');
  // Start at the default slides directory
  browseTo('');
}

async function browseTo(dir) {
  const list = document.getElementById('browserList');
  const pathInput = document.getElementById('browserPathInput');
  list.innerHTML = '<p style="color:var(--text-dim);font-size:0.85rem;padding:0.5rem;">Loading...</p>';

  const url = dir ? `/api/browse?dir=${encodeURIComponent(dir)}` : '/api/browse';
  const data = await api('GET', url);

  if (data.error) {
    list.innerHTML = `<p style="color:var(--danger);font-size:0.85rem;padding:0.5rem;">${escHtml(data.error)}</p>`;
    return;
  }

  currentBrowserDir = data.dir;
  pathInput.value = data.dir;

  let html = '';

  // Parent directory link
  if (data.parent) {
    html += `<div class="dir-item" onclick="browseTo('${escAttr(data.parent)}')">
      <span class="icon">⬆</span> <span>..</span>
    </div>`;
  }

  // Subdirectories
  if (data.dirs.length) {
    html += '<div class="browser-section-label">Folders</div>';
    data.dirs.forEach(d => {
      html += `<div class="dir-item" onclick="browseTo('${escAttr(d.path)}')">
        <span class="icon">📁</span> <span>${escHtml(d.name)}</span>
      </div>`;
    });
  }

  // HTML files
  if (data.files.length) {
    html += '<div class="browser-section-label">HTML Files</div>';
    data.files.forEach(f => {
      html += `<div class="file-item" onclick="loadFile('${escAttr(f.path)}')">
        <span>📄 ${escHtml(f.name)}</span>
        <span class="date">${new Date(f.modified).toLocaleDateString()}</span>
      </div>`;
    });
  }

  if (!data.dirs.length && !data.files.length) {
    html += '<p style="color:var(--text-dim);font-size:0.85rem;padding:0.5rem;">No folders or HTML files here.</p>';
  }

  list.innerHTML = html;
}

function closeModal() {
  document.getElementById('openModal').classList.add('hidden');
}

async function loadFile(filePath) {
  closeModal();
  const data = await api('GET', `/api/file?path=${encodeURIComponent(filePath)}`);
  if (data.error) { toast(data.error, true); return; }
  currentFile = data.path;
  rawHtml = data.content;
  parseSlides(rawHtml);
  dirty = false;
  updateUI();
}

async function saveFile() {
  if (!currentFile) return;
  const html = reassemble();
  const data = await api('POST', '/api/file', { path: currentFile, content: html });
  if (data.error) { toast(data.error, true); return; }
  rawHtml = html;
  dirty = false;
  updateFilename();
  toast('Saved');
}

function saveAsFile() {
  document.getElementById('saveAsModal').classList.remove('hidden');
  document.getElementById('saveAsName').value = currentFile || 'slides.html';
  document.getElementById('saveAsName').focus();
}

function closeSaveAsModal() {
  document.getElementById('saveAsModal').classList.add('hidden');
}

async function confirmSaveAs() {
  let name = document.getElementById('saveAsName').value.trim();
  if (!name) return;
  if (!name.endsWith('.html')) name += '.html';
  // If it's just a filename (no slashes), save in the same directory as the current file
  if (!name.includes('/') && currentFile) {
    const dir = currentFile.substring(0, currentFile.lastIndexOf('/'));
    name = dir + '/' + name;
  }
  currentFile = name;
  closeSaveAsModal();
  await saveFile();
}

// ─── Parsing ───
let extraStyles = [];   // additional <style> elements beyond the first
let extraScripts = [];  // additional <script> elements beyond the first
let postDeckContent = ''; // content between the deck and first script (progress bar, counter, etc.)

function parseSlides(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  // Extract head content (title, meta, link tags)
  const headEl = doc.querySelector('head');
  headContent = '';
  extraStyles = [];
  if (headEl) {
    let firstStyle = true;
    for (const child of headEl.children) {
      if (child.tagName === 'STYLE') {
        if (firstStyle) {
          styleContent = child.textContent;
          firstStyle = false;
        } else {
          extraStyles.push(child.outerHTML);
        }
        continue;
      }
      headContent += child.outerHTML + '\n';
    }
    if (firstStyle) styleContent = ''; // no style found
  }

  // Extract scripts — first one is the main presentation script
  extraScripts = [];
  const scriptEls = doc.querySelectorAll('body script');
  scriptContent = '';
  scriptEls.forEach((el, i) => {
    if (i === 0) {
      scriptContent = el.textContent;
    } else {
      extraScripts.push(el.outerHTML);
    }
  });

  // Extract slides
  slides = [];
  const deck = doc.querySelector('.deck');
  if (deck) {
    deck.querySelectorAll('.slide').forEach(s => {
      slides.push(s.outerHTML);
    });
  }

  // Capture content between the deck and the first script (progress bar, counter, etc.)
  postDeckContent = '';
  if (deck) {
    let sibling = deck.nextElementSibling;
    while (sibling && sibling.tagName !== 'SCRIPT') {
      postDeckContent += sibling.outerHTML + '\n';
      sibling = sibling.nextElementSibling;
    }
  }

  // Auto-detect logo from the first slide that has one
  deckLogo = '';
  for (const s of slides) {
    const tmpDoc = new DOMParser().parseFromString(s, 'text/html');
    const logo = tmpDoc.querySelector('img.slide-logo');
    if (logo && logo.getAttribute('src')) {
      deckLogo = logo.getAttribute('src');
      break;
    }
  }

  selectedSlide = slides.length > 0 ? 0 : -1;
}

function reassemble() {
  let html = '<!DOCTYPE html>\n<html lang="en">\n<head>\n';
  html += headContent;
  html += '<style>\n' + styleContent + '\n</style>\n';
  extraStyles.forEach(s => { html += s + '\n'; });
  html += '</head>\n<body>\n';
  html += '<div class="deck" id="deck">\n\n';

  slides.forEach((s, i) => {
    // Update data-slide attribute and ensure first slide has active class
    const parser = new DOMParser();
    const doc = parser.parseFromString(s, 'text/html');
    const el = doc.querySelector('.slide');
    if (el) {
      el.setAttribute('data-slide', i);
      if (i === 0) {
        el.classList.add('active');
      } else {
        el.classList.remove('active');
      }
      html += el.outerHTML + '\n\n';
    } else {
      html += s + '\n\n';
    }
  });

  html += '</div><!-- /deck -->\n\n';
  // Restore original post-deck content (progress bar, counter, etc.)
  if (postDeckContent) {
    html += postDeckContent + '\n';
  }
  html += '<script>\n' + scriptContent + '\n<\/script>\n';
  extraScripts.forEach(s => { html += s + '\n'; });
  html += '</body>\n</html>';
  return html;
}

// ─── UI ───
function updateUI() {
  updateFilename();
  renderSlideList();
  renderEditor();
  updatePreview();
  document.getElementById('btnSave').disabled = !currentFile;
  document.getElementById('btnSaveAs').disabled = slides.length === 0;
  document.getElementById('btnAdd').disabled = slides.length === 0;
  document.getElementById('btnPrint').disabled = slides.length === 0;
  document.getElementById('btnPalette').disabled = slides.length === 0;
  document.getElementById('logoControls').style.display = currentFile ? 'inline-flex' : 'none';
  document.getElementById('deckLogoInput').value = deckLogo;
}

function updateFilename() {
  const el = document.getElementById('filename');
  if (currentFile) {
    const name = currentFile.substring(currentFile.lastIndexOf('/') + 1);
    el.textContent = name;
    el.title = currentFile;
  } else {
    el.textContent = 'No file open';
    el.title = '';
  }
  el.className = 'filename' + (dirty ? ' unsaved' : '');
}

function markDirty() {
  dirty = true;
  updateFilename();
}

// ─── Slide list (thumbnails) ───
function renderSlideList() {
  const list = document.getElementById('slideList');
  document.getElementById('slideCount').textContent = slides.length ? `${slides.length}` : '';

  if (!slides.length) {
    list.innerHTML = '';
    return;
  }

  list.innerHTML = slides.map((s, i) => {
    const title = getSlideTitle(s, i);
    return `
      <div class="slide-thumb ${i === selectedSlide ? 'active' : ''}"
           onclick="selectSlide(${i})" id="thumb-${i}">
        <iframe id="thumbFrame-${i}" scrolling="no"></iframe>
        <span class="label">${i + 1}. ${escHtml(title)}</span>
        <div class="slide-actions">
          ${i > 0 ? `<button onclick="event.stopPropagation();moveSlide(${i},-1)" title="Move up">&#9650;</button>` : ''}
          ${i < slides.length - 1 ? `<button onclick="event.stopPropagation();moveSlide(${i},1)" title="Move down">&#9660;</button>` : ''}
          <button onclick="event.stopPropagation();duplicateSlide(${i})" title="Duplicate">&#9851;</button>
          <button class="danger" onclick="event.stopPropagation();deleteSlide(${i})" title="Delete">&#10005;</button>
        </div>
      </div>`;
  }).join('');

  // Render thumbnails in iframes after DOM update
  requestAnimationFrame(() => {
    slides.forEach((s, i) => renderThumb(i));
    fitThumbs();
  });
}

function getSlideTitle(html, index) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const h1 = doc.querySelector('h1');
  if (h1) return h1.textContent.trim();
  const h2 = doc.querySelector('h2');
  if (h2) return h2.textContent.trim();
  const statement = doc.querySelector('.statement');
  if (statement) return statement.textContent.trim().substring(0, 50) + '...';
  return `Slide ${index + 1}`;
}

function renderThumb(i) {
  const iframe = document.getElementById(`thumbFrame-${i}`);
  if (!iframe) return;
  const html = buildSlidePreviewHtml(i);
  iframe.srcdoc = html;
}

function buildSlidePreviewHtml(i) {
  const slideHtml = slides[i]
    .replace(/class="slide([^"]*)"/, 'class="slide$1 active"');
  return `<!DOCTYPE html><html><head>
    <style>${styleContent}
      body { margin: 0; overflow: hidden; }
      .deck-progress, .counter { display: none; }
      .slide { position: relative; opacity: 1; transform: none; pointer-events: none; }
      .slide .anim { opacity: 1; transform: none; }
    </style></head><body>
    <div class="deck">${slideHtml}</div></body></html>`;
}

function fitThumbs() {
  document.querySelectorAll('.slide-thumb').forEach(thumb => {
    const iframe = thumb.querySelector('iframe');
    if (!iframe) return;
    const w = thumb.clientWidth;
    const scale = w / 1280;
    iframe.style.transform = `scale(${scale})`;
    thumb.style.height = (720 * scale) + 'px';
  });
}
window.addEventListener('resize', fitThumbs);

function selectSlide(i) {
  selectedSlide = i;
  document.querySelectorAll('.slide-thumb').forEach((el, j) => {
    el.classList.toggle('active', j === i);
  });
  renderEditor();
  updatePreview();
}

function moveSlide(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= slides.length) return;
  [slides[i], slides[j]] = [slides[j], slides[i]];
  if (selectedSlide === i) selectedSlide = j;
  else if (selectedSlide === j) selectedSlide = i;
  markDirty();
  renderSlideList();
  renderEditor();
  updatePreview();
}

function duplicateSlide(i) {
  slides.splice(i + 1, 0, slides[i]);
  selectedSlide = i + 1;
  markDirty();
  renderSlideList();
  renderEditor();
  updatePreview();
}

function deleteSlide(i) {
  if (!confirm(`Delete slide ${i + 1}?`)) return;
  slides.splice(i, 1);
  if (selectedSlide >= slides.length) selectedSlide = slides.length - 1;
  markDirty();
  renderSlideList();
  renderEditor();
  updatePreview();
}

function addSlide() {
  const logoHtml = deckLogo ? `\n  <img class="slide-logo" src="${escAttr(deckLogo)}" alt="">` : '';
  const newSlide = `<div class="slide" data-slide="${slides.length}">${logoHtml}
  <p class="kicker blue anim">Section</p>
  <h2 class="anim">New Slide</h2>
  <p class="subtitle anim">Add your content here.</p>
</div>`;
  slides.push(newSlide);
  selectedSlide = slides.length - 1;
  markDirty();
  renderSlideList();
  renderEditor();
  updatePreview();
  // Scroll to bottom of slide list
  const list = document.getElementById('slideList');
  list.scrollTop = list.scrollHeight;
}

// ─── New deck ───
function newDeck() {
  if (dirty && !confirm('You have unsaved changes. Create a new deck anyway?')) return;

  const name = prompt('Filename for the new deck:', 'new-deck.html');
  if (!name) return;

  const filename = name.endsWith('.html') ? name : name + '.html';
  let filePath = filename;
  if (!filename.includes('/') && currentFile) {
    const dir = currentFile.substring(0, currentFile.lastIndexOf('/'));
    filePath = dir + '/' + filename;
  }

  currentFile = filePath;
  rawHtml = buildNewDeckHtml('New Presentation');
  parseSlides(rawHtml);
  dirty = true;
  updateUI();
  toast('New deck created — save to write to disk');
}

function buildNewDeckHtml(title) {
  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${escHtml(title)}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0c1520;
    --surface: #132030;
    --surface-light: #1a2940;
    --text: #e8edf2;
    --text-dim: #8ba0b8;
    --accent: #3bb0d6;
    --accent-warm: #f0944e;
    --accent-green: #5cd9a0;
    --accent-purple: #a78bfa;
    --slide-max: 1100px;
  }

  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; width: 100vw; }
  .deck { position: relative; width: 100%; height: 100%; }
  .slide {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    justify-content: center; padding: 5vh 7vw;
    opacity: 0; transform: translateY(20px);
    transition: opacity 0.55s ease, transform 0.55s ease;
    pointer-events: none;
  }
  .slide.active { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .slide .anim { opacity: 0; transform: translateY(16px); transition: opacity 0.5s ease, transform 0.5s ease; }
  .slide.active .anim { opacity: 1; transform: translateY(0); }

  h1 { font-size: clamp(2.4rem, 5vw, 4.2rem); font-weight: 800; line-height: 1.1; }
  h2 { font-size: clamp(1.6rem, 3vw, 2.6rem); font-weight: 700; line-height: 1.2; margin-bottom: 0.8rem; }
  .subtitle { font-size: clamp(0.95rem, 1.6vw, 1.25rem); font-weight: 300; color: var(--text-dim); line-height: 1.65; max-width: 700px; }
  .kicker { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 0.9rem; }
  .kicker.blue { color: var(--accent); }
  .kicker.warm { color: var(--accent-warm); }
  .kicker.green { color: var(--accent-green); }
  .kicker.purple { color: var(--accent-purple); }

  .items { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; margin-top: 1.5rem; }
  .item { background: var(--surface-light); border-radius: 12px; padding: 1.5rem; }
  .item h3 { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.5rem; }
  .item p { font-size: 0.88rem; color: var(--text-dim); line-height: 1.55; }

  .deck-progress { position: fixed; bottom: 0; left: 0; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent-warm)); transition: width 0.4s ease; z-index: 100; }
  .counter { position: fixed; bottom: 1.4rem; right: 1.8rem; font-size: 0.72rem; color: var(--text-dim); z-index: 100; opacity: 0.5; }
</style>
</head>
<body>
<div class="deck" id="deck">

<div class="slide active" data-slide="0">
  <h1 class="anim">${escHtml(title)}</h1>
  <p class="subtitle anim">Add your subtitle here.</p>
</div>

</div>

<div class="deck-progress" id="progress"></div>
<div class="counter" id="counter"></div>

<script>
  const deck = document.getElementById('deck');
  const slides = deck.querySelectorAll('.slide');
  const progress = document.getElementById('progress');
  const counter = document.getElementById('counter');
  const total = slides.length;
  let current = 0;
  function goTo(n) {
    if (n < 0 || n >= total) return;
    slides[current].classList.remove('active');
    current = n;
    slides[current].classList.add('active');
    progress.style.width = ((current / (total - 1)) * 100) + '%';
    counter.textContent = (current + 1) + ' / ' + total;
  }
  document.addEventListener('keydown', (e) => {
    if (['ArrowRight',' ','ArrowDown'].includes(e.key)) { e.preventDefault(); goTo(current+1); }
    if (['ArrowLeft','ArrowUp'].includes(e.key)) { e.preventDefault(); goTo(current-1); }
  });
  goTo(0);
<\/script>
</body>
</html>`;
}

// ─── Print to PDF ───
function printDeck() {
  if (!slides.length) return;
  const printHtml = buildPrintHtml();

  // Open the print-ready deck in a new window and trigger print
  const win = window.open('', '_blank');
  if (!win) { toast('Pop-up blocked — please allow pop-ups for this site', true); return; }
  win.document.write(printHtml);
  win.document.close();
  win.onload = () => {
    win.focus();
    win.print();
  };
}

function buildPrintHtml() {
  const printOverrides = `
    @page { size: landscape; margin: 0; }
    @media print { @page { size: landscape; margin: 0; } }
    html, body { overflow: visible; height: auto; margin: 0; padding: 0; }
    body { background: var(--bg, #0c1520); }
    .deck { position: static; width: auto; height: auto; overflow: visible; }
    .slide {
      position: relative !important;
      opacity: 1 !important;
      transform: none !important;
      pointer-events: auto !important;
      width: 100vw;
      height: 100vh;
      page-break-after: always;
      break-after: page;
      display: flex !important;
      flex-direction: column;
      justify-content: center;
      padding: 5vh 7vw;
      overflow: hidden;
    }
    .slide:last-child { page-break-after: auto; break-after: auto; }
    .slide .anim { opacity: 1 !important; transform: none !important; }
    .deck-progress, .counter { display: none !important; }
  `;

  let html = '<!DOCTYPE html><html><head>\n';
  html += headContent;
  html += '<style>\n' + styleContent + '\n' + printOverrides + '\n</style>\n';
  extraStyles.forEach(s => { html += s + '\n'; });
  html += '</head><body>\n<div class="deck">\n';
  slides.forEach(s => {
    html += s.replace(/class="slide([^"]*)"/, 'class="slide$1 active"') + '\n';
  });
  html += '</div>\n</body></html>';
  return html;
}

  document.getElementById('paletteModal').classList.remove('hidden');
  renderPaletteList();
}

function closePaletteModal() {
  document.getElementById('paletteModal').classList.add('hidden');
}

function renderPaletteList() {
  const list = document.getElementById('paletteList');
  list.innerHTML = PALETTES.map((p, i) => {
    const swatchKeys = ['--bg', '--accent', '--accent-warm', '--accent-green', '--accent-purple'];
    const swatches = swatchKeys
      .map(key => p.vars[key] ? `<div class="palette-swatch" style="background:${p.vars[key]}"></div>` : '')
      .join('');
    return `<div class="palette-option" onclick="applyPalette(${i})">
      <div class="palette-swatches">${swatches}</div>
      <div>
        <div class="palette-name">${escHtml(p.name)}</div>
        <div class="palette-desc">${escHtml(p.desc)}</div>
      </div>
    </div>`;
  }).join('');
}

function applyPalette(index) {
  const palette = PALETTES[index];
  for (const [prop, value] of Object.entries(palette.vars)) {
    const regex = new RegExp(
      '(' + prop.replace(/-/g, '\\-') + '\\s*:\\s*)([^;\\n}]+)',
      'g'
    );
    styleContent = styleContent.replace(regex, '$1' + value);
  }
  markDirty();
  closePaletteModal();
  renderSlideList();
  renderEditor();
  updatePreview();
  toast('Applied palette: ' + palette.name);
}

function detectLayout(slideEl) {
  // Check most specific patterns first
  for (const layout of SLIDE_LAYOUTS) {
    if (layout.id === 'blank') continue;
    if (layout.detect(slideEl)) return layout.id;
  }
  // Check if slide is essentially empty
  if (!slideEl.children.length || (slideEl.children.length === 1 && slideEl.querySelector('img.slide-logo'))) {
    return 'blank';
  }
  return null;
}

function extractContent(slideEl) {
  const content = {};
  // Simple text/html elements
  const selectors = ['h1', 'h2', '.kicker', '.subtitle', '.statement', '.meta', '.highlight'];
  selectors.forEach(sel => {
    const el = slideEl.querySelector(sel);
    if (el) {
      content[sel] = { text: el.textContent.trim(), html: el.innerHTML.trim() };
    }
  });
  // Kicker color
  const kicker = slideEl.querySelector('.kicker');
  if (kicker) {
    content['_kickerColor'] = ['blue','warm','green','purple'].find(c => kicker.classList.contains(c)) || 'blue';
  }
  // Items
  const items = slideEl.querySelectorAll('.items .item');
  if (items.length) {
    content['_items'] = Array.from(items).map(item => item.outerHTML);
  }
  // Stats
  const stats = slideEl.querySelectorAll('.stat');
  if (stats.length) {
    content['_stats'] = Array.from(stats).map(s => s.outerHTML);
  }
  // Timeline phases
  const phases = slideEl.querySelectorAll('.timeline-phase');
  if (phases.length) {
    content['_phases'] = Array.from(phases).map(p => p.outerHTML);
  }
  // Two-col
  const twoCol = slideEl.querySelector('.two-col');
  if (twoCol) {
    content['_twocol'] = twoCol.innerHTML;
  }
  return content;
}

function applyLayout(layoutId) {
  if (selectedSlide < 0) return;

  const layout = SLIDE_LAYOUTS.find(l => l.id === layoutId);
  if (!layout) return;

  if (!confirm(`Apply "${layout.name}" layout? Content will be preserved where possible.`)) return;

  // Parse current slide and extract content
  const parser = new DOMParser();
  const curDoc = parser.parseFromString(slides[selectedSlide], 'text/html');
  const curSlide = curDoc.querySelector('.slide');
  if (!curSlide) return;

  const content = extractContent(curSlide);

  // Build new slide HTML
  const logoHtml = deckLogo ? `\n  <img class="slide-logo" src="${escAttr(deckLogo)}" alt="">` : '';
  const dataSlide = curSlide.getAttribute('data-slide') || selectedSlide;
  const isActive = curSlide.classList.contains('active');

  const innerHtml = layout.template(logoHtml);
  const newSlideHtml = `<div class="slide${isActive ? ' active' : ''}" data-slide="${dataSlide}">${innerHtml}\n</div>`;

  // Parse the new slide and fill in preserved content
  const newDoc = parser.parseFromString(newSlideHtml, 'text/html');
  const newSlide = newDoc.querySelector('.slide');
  if (!newSlide) return;

  // Map content into new layout
  // Headings: try direct match first, then cross-map h1<->h2
  if (content['h1']) {
    const h1 = newSlide.querySelector('h1');
    if (h1) h1.textContent = content['h1'].text;
    else {
      const h2 = newSlide.querySelector('h2');
      if (h2 && !content['h2']) h2.textContent = content['h1'].text;
    }
  }
  if (content['h2']) {
    const h2 = newSlide.querySelector('h2');
    if (h2) h2.textContent = content['h2'].text;
    else {
      const h1 = newSlide.querySelector('h1');
      if (h1 && !content['h1']) h1.textContent = content['h2'].text;
    }
  }

  // Kicker
  if (content['.kicker']) {
    const kicker = newSlide.querySelector('.kicker');
    if (kicker) {
      kicker.textContent = content['.kicker'].text;
      const color = content['_kickerColor'] || 'blue';
      ['blue','warm','green','purple'].forEach(c => kicker.classList.remove(c));
      kicker.classList.add(color);
    }
  }

  // Subtitle
  if (content['.subtitle']) {
    const sub = newSlide.querySelector('.subtitle');
    if (sub) sub.textContent = content['.subtitle'].text;
  }

  // Statement
  if (content['.statement']) {
    const st = newSlide.querySelector('.statement');
    if (st) st.innerHTML = content['.statement'].html;
  }

  // Highlight
  if (content['.highlight']) {
    const hl = newSlide.querySelector('.highlight');
    if (hl) hl.innerHTML = content['.highlight'].html;
  }

  // Items
  if (content['_items'] && newSlide.querySelector('.items')) {
    const itemsEl = newSlide.querySelector('.items');
    itemsEl.innerHTML = content['_items'].join('\n');
  }

  // Stats
  if (content['_stats'] && newSlide.querySelector('.stat-row, .stat')) {
    const container = newSlide.querySelector('.stat-row') || newSlide;
    const existingStats = container.querySelectorAll('.stat');
    existingStats.forEach(s => s.remove());
    content['_stats'].forEach(html => {
      const tmp = parser.parseFromString(html, 'text/html');
      const stat = tmp.querySelector('.stat');
      if (stat) container.appendChild(stat);
    });
  }

  // Timeline phases
  if (content['_phases'] && newSlide.querySelector('.timeline')) {
    const timeline = newSlide.querySelector('.timeline');
    timeline.innerHTML = content['_phases'].join('\n');
  }

  // Two columns
  if (content['_twocol'] && newSlide.querySelector('.two-col')) {
    newSlide.querySelector('.two-col').innerHTML = content['_twocol'];
  }

  slides[selectedSlide] = newSlide.outerHTML;
  markDirty();
  renderSlideList();
  renderEditor();
  updatePreview();
}

function renderLayoutSelector(slideEl) {
  const currentId = detectLayout(slideEl);
  return SLIDE_LAYOUTS.map(layout => {
    const isActive = layout.id === currentId;
    return `<div class="layout-option ${isActive ? 'active' : ''}"
                 onclick="applyLayout('${layout.id}')" title="${escAttr(layout.desc)}">
      <div class="layout-preview">${layout.icon}</div>
      <span class="layout-name">${escHtml(layout.name)}</span>
    </div>`;
  }).join('');
}

// ─── Deck logo ───
function setDeckLogo(url) {
  deckLogo = url.trim();
  markDirty();
}

function applyLogoToAll() {
  slides = slides.map(s => {
    const doc = new DOMParser().parseFromString(s, 'text/html');
    const slide = doc.querySelector('.slide');
    if (!slide) return s;
    let logo = slide.querySelector('img.slide-logo');
    if (deckLogo) {
      if (!logo) {
        logo = doc.createElement('img');
        logo.className = 'slide-logo';
        logo.alt = '';
        slide.insertBefore(logo, slide.firstChild);
      }
      logo.src = deckLogo;
    } else if (logo) {
      logo.remove();
    }
    return slide.outerHTML;
  });
  markDirty();
  renderSlideList();
  renderEditor();
  updatePreview();
  toast(deckLogo ? 'Logo applied to all slides' : 'Logo removed from all slides');
}

function removeDeckLogo() {
  deckLogo = '';
  document.getElementById('deckLogoInput').value = '';
  applyLogoToAll();
}

// ─── Editor ───
function renderEditor() {
  const container = document.getElementById('editorContent');
  const empty = document.getElementById('emptyState');

  if (selectedSlide < 0 || !slides.length) {
    container.style.display = 'none';
    empty.style.display = currentFile ? 'none' : '';
    return;
  }

  empty.style.display = 'none';
  container.style.display = 'block';

  const parser = new DOMParser();
  const doc = parser.parseFromString(slides[selectedSlide], 'text/html');
  const slide = doc.querySelector('.slide');
  if (!slide) { container.innerHTML = '<p>Could not parse slide</p>'; return; }

  let html = `<h3 style="margin-bottom:1rem;">Slide ${selectedSlide + 1}</h3>`;

  // Layout selector
  html += `<div class="section-header">Layout</div>`;
  html += `<div class="layout-selector">${renderLayoutSelector(slide)}</div>`;

  // Detect and render editable elements
  const editables = findEditables(slide);

  editables.forEach((ed, idx) => {
    const id = `field-${idx}`;
    if (ed.type === 'section') {
      html += `<div class="section-header">${escHtml(ed.label)}</div>`;
    } else if (ed.type === 'text') {
      html += `<div class="field-group">
        <label>${escHtml(ed.label)}</label>
        <input type="text" id="${id}" value="${escAttr(ed.value)}"
               onchange="updateField(${idx}, this.value)">
      </div>`;
    } else if (ed.type === 'textarea') {
      html += `<div class="field-group">
        <label>${escHtml(ed.label)}</label>
        <textarea id="${id}" oninput="updateField(${idx}, this.value)">${escHtml(ed.value)}</textarea>
      </div>`;
    } else if (ed.type === 'richtext') {
      html += `<div class="field-group">
        <label>${escHtml(ed.label)} <span style="font-weight:400;color:var(--text-dim)">(HTML)</span></label>
        <textarea id="${id}" oninput="updateField(${idx}, this.value)" style="min-height:80px;">${escHtml(ed.value)}</textarea>
      </div>`;
    } else if (ed.type === 'select') {
      html += `<div class="field-group">
        <label>${escHtml(ed.label)}</label>
        <select id="${id}" onchange="updateField(${idx}, this.value)">
          ${ed.options.map(o => `<option value="${escAttr(o)}" ${o === ed.value ? 'selected' : ''}>${escHtml(o)}</option>`).join('')}
        </select>
      </div>`;
    } else if (ed.type === 'items') {
      html += `<div class="section-header">${escHtml(ed.label)}</div>`;
      ed.items.forEach((item, ii) => {
        html += `<div class="item-card">
          <div class="item-card-header">
            <span>Item ${ii + 1}</span>
            <button class="danger" onclick="removeItem(${idx}, ${ii})" style="padding:1px 6px;font-size:0.65rem;">Remove</button>
          </div>`;
        item.fields.forEach((f, fi) => {
          const fid = `field-${idx}-${ii}-${fi}`;
          if (f.multiline) {
            html += `<div class="field-group">
              <label>${escHtml(f.label)}</label>
              <textarea id="${fid}" oninput="updateItemField(${idx}, ${ii}, ${fi}, this.value)">${escHtml(f.value)}</textarea>
            </div>`;
          } else {
            html += `<div class="field-group">
              <label>${escHtml(f.label)}</label>
              <input type="text" id="${fid}" value="${escAttr(f.value)}"
                     onchange="updateItemField(${idx}, ${ii}, ${fi}, this.value)">
            </div>`;
          }
        });
        html += '</div>';
      });
      html += `<button onclick="addItem(${idx})" style="margin-bottom:1rem;">+ Add Item</button>`;
    }
  });

  // Raw HTML fallback
  html += `<div class="section-header" style="margin-top:1.5rem;">Raw HTML</div>
    <div class="field-group">
      <label>Direct HTML editing</label>
      <textarea id="rawSlideHtml" style="min-height:200px;font-family:monospace;font-size:0.75rem;"
                oninput="updateRawHtml(this.value)">${escHtml(slides[selectedSlide])}</textarea>
    </div>`;

  container.innerHTML = html;

  // Store editables for update callbacks
  container._editables = editables;
}

function findEditables(slide) {
  const eds = [];

  // Logo
  const logo = slide.querySelector('img.slide-logo');
  if (logo) {
    eds.push({ type: 'text', label: 'Logo URL', selector: 'img.slide-logo', value: logo.getAttribute('src') || '',
      apply: (el, val) => {
        if (val) { el.setAttribute('src', val); }
        else { el.remove(); }
      }
    });
  }

  // Kicker
  const kicker = slide.querySelector('.kicker');
  if (kicker) {
    eds.push({ type: 'text', label: 'Kicker', selector: '.kicker', value: kicker.textContent.trim(),
      apply: (el, val) => { el.textContent = val; } });
    const kickerColor = ['blue','warm','green','purple'].find(c => kicker.classList.contains(c)) || 'blue';
    eds.push({ type: 'select', label: 'Kicker Colour', selector: '.kicker', value: kickerColor,
      options: ['blue', 'warm', 'green', 'purple'],
      apply: (el, val) => { ['blue','warm','green','purple'].forEach(c => el.classList.remove(c)); el.classList.add(val); } });
  }

  // Year tag
  const yearTag = slide.querySelector('.year-tag');
  if (yearTag) {
    const textNode = Array.from(yearTag.childNodes).find(n => n.nodeType === 3 || (n.nodeType === 1 && !n.classList.contains('dot')));
    const tagText = yearTag.textContent.trim();
    eds.push({ type: 'text', label: 'Year Tag', selector: '.year-tag', value: tagText,
      apply: (el, val) => {
        const dot = el.querySelector('.dot');
        el.textContent = '';
        if (dot) el.appendChild(dot);
        el.appendChild(document.createTextNode(val));
      }
    });
  }

  // H1
  const h1 = slide.querySelector('h1');
  if (h1) {
    eds.push({ type: 'text', label: 'Title (H1)', selector: 'h1', value: h1.textContent.trim(),
      apply: (el, val) => { el.textContent = val; } });
  }

  // H2
  const h2 = slide.querySelector('h2');
  if (h2) {
    eds.push({ type: 'text', label: 'Heading (H2)', selector: 'h2', value: h2.textContent.trim(),
      apply: (el, val) => { el.textContent = val; } });
  }

  // Subtitle
  const subtitle = slide.querySelector('.subtitle');
  if (subtitle) {
    eds.push({ type: 'textarea', label: 'Subtitle', selector: '.subtitle', value: subtitle.textContent.trim(),
      apply: (el, val) => { el.textContent = val; } });
  }

  // Statement
  const statements = slide.querySelectorAll('.statement');
  statements.forEach((st, i) => {
    eds.push({ type: 'richtext', label: `Statement ${statements.length > 1 ? i + 1 : ''}`, selector: `.statement:nth-of-type(${i + 1})`, value: st.innerHTML.trim(),
      selectorIndex: i,
      apply: (el, val) => { el.innerHTML = val; } });
  });

  // Title slide meta
  const meta = slide.querySelector('.meta');
  if (meta) {
    eds.push({ type: 'text', label: 'Meta', selector: '.meta', value: meta.textContent.trim(),
      apply: (el, val) => { el.textContent = val; } });
  }

  // Items (cards)
  const itemsContainer = slide.querySelector('.items');
  if (itemsContainer) {
    const items = itemsContainer.querySelectorAll('.item');
    const itemData = [];
    items.forEach((item, ii) => {
      const fields = [];
      const tag = item.querySelector('.tag');
      if (tag) {
        fields.push({ label: 'Tag', value: tag.textContent.trim(), selector: '.tag', multiline: false });
      }
      const h3 = item.querySelector('h3');
      if (h3) {
        fields.push({ label: 'Title', value: h3.textContent.trim(), selector: 'h3', multiline: false });
      }
      const p = item.querySelector('p');
      if (p) {
        fields.push({ label: 'Description', value: p.textContent.trim(), selector: 'p', multiline: true });
      }
      itemData.push({ fields });
    });
    eds.push({ type: 'items', label: 'Cards', containerSelector: '.items', items: itemData });
  }

  // Timeline phases
  const timeline = slide.querySelector('.timeline');
  if (timeline) {
    const phases = timeline.querySelectorAll('.timeline-phase');
    phases.forEach((phase, pi) => {
      eds.push({ type: 'section', label: `Timeline Phase ${pi + 1}` });
      const yLabel = phase.querySelector('.y-label');
      if (yLabel) {
        eds.push({ type: 'text', label: 'Phase Label', selector: `.timeline-phase:nth-child(${pi + 1}) .y-label`, value: yLabel.textContent.trim(),
          phaseIndex: pi,
          apply: (el, val) => { el.textContent = val; } });
      }
      const h3 = phase.querySelector('h3');
      if (h3) {
        eds.push({ type: 'text', label: 'Phase Title', selector: `.timeline-phase:nth-child(${pi + 1}) h3`, value: h3.textContent.trim(),
          phaseIndex: pi,
          apply: (el, val) => { el.textContent = val; } });
      }
      const p = phase.querySelector(':scope > p:not(.y-label)');
      if (p) {
        eds.push({ type: 'textarea', label: 'Phase Description', selector: `.timeline-phase:nth-child(${pi + 1}) > p:not(.y-label)`, value: p.textContent.trim(),
          phaseIndex: pi,
          apply: (el, val) => { el.textContent = val; } });
      }
      const lis = phase.querySelectorAll('ul li');
      if (lis.length) {
        const listText = Array.from(lis).map(li => li.textContent.trim()).join('\n');
        eds.push({ type: 'textarea', label: 'List Items (one per line)', value: listText,
          phaseIndex: pi, isList: true,
          apply: null });
      }
    });
  }

  // Stats
  const stats = slide.querySelectorAll('.stat');
  if (stats.length) {
    eds.push({ type: 'section', label: 'Statistics' });
    stats.forEach((stat, si) => {
      const num = stat.querySelector('.stat-num');
      const label = stat.querySelector('.stat-label');
      if (num) eds.push({ type: 'text', label: `Stat ${si + 1} Value`, value: num.textContent.trim(), statIndex: si, statPart: 'num' });
      if (label) eds.push({ type: 'text', label: `Stat ${si + 1} Label`, value: label.textContent.trim(), statIndex: si, statPart: 'label' });
    });
  }

  // Highlight box
  const highlight = slide.querySelector('.highlight');
  if (highlight) {
    eds.push({ type: 'richtext', label: 'Highlight Box', selector: '.highlight', value: highlight.innerHTML.trim(),
      apply: (el, val) => { el.innerHTML = val; } });
  }

  return eds;
}

function updateField(idx, value) {
  const container = document.getElementById('editorContent');
  const editables = container._editables;
  if (!editables || !editables[idx]) return;

  const ed = editables[idx];
  const parser = new DOMParser();
  const doc = parser.parseFromString(slides[selectedSlide], 'text/html');
  const slide = doc.querySelector('.slide');
  if (!slide) return;

  // Apply the change based on type
  if (ed.selector && ed.apply) {
    let el;
    if (ed.selectorIndex !== undefined) {
      el = slide.querySelectorAll('.statement')[ed.selectorIndex];
    } else {
      el = slide.querySelector(ed.selector);
    }
    if (el) ed.apply(el, value);
  } else if (ed.isList) {
    const phases = slide.querySelectorAll('.timeline-phase');
    const phase = phases[ed.phaseIndex];
    if (phase) {
      const ul = phase.querySelector('ul');
      if (ul) {
        ul.innerHTML = value.split('\n').filter(l => l.trim())
          .map(l => `<li>${l.trim()}</li>`).join('');
      }
    }
  } else if (ed.statIndex !== undefined) {
    const stats = slide.querySelectorAll('.stat');
    const stat = stats[ed.statIndex];
    if (stat) {
      const target = stat.querySelector(ed.statPart === 'num' ? '.stat-num' : '.stat-label');
      if (target) target.textContent = value;
    }
  }

  slides[selectedSlide] = slide.outerHTML;
  markDirty();
  renderThumb(selectedSlide);
  updatePreview();
}

function updateItemField(edIdx, itemIdx, fieldIdx, value) {
  const container = document.getElementById('editorContent');
  const editables = container._editables;
  if (!editables || !editables[edIdx]) return;

  const ed = editables[edIdx];
  const parser = new DOMParser();
  const doc = parser.parseFromString(slides[selectedSlide], 'text/html');
  const slide = doc.querySelector('.slide');
  if (!slide) return;

  const itemsEl = slide.querySelector(ed.containerSelector);
  if (!itemsEl) return;
  const items = itemsEl.querySelectorAll('.item');
  const item = items[itemIdx];
  if (!item) return;

  const fieldDef = ed.items[itemIdx].fields[fieldIdx];
  const target = item.querySelector(fieldDef.selector);
  if (target) target.textContent = value;

  slides[selectedSlide] = slide.outerHTML;
  markDirty();
  renderThumb(selectedSlide);
  updatePreview();
}

function removeItem(edIdx, itemIdx) {
  const container = document.getElementById('editorContent');
  const editables = container._editables;
  if (!editables || !editables[edIdx]) return;

  const ed = editables[edIdx];
  const parser = new DOMParser();
  const doc = parser.parseFromString(slides[selectedSlide], 'text/html');
  const slide = doc.querySelector('.slide');
  if (!slide) return;

  const itemsEl = slide.querySelector(ed.containerSelector);
  if (!itemsEl) return;
  const items = itemsEl.querySelectorAll('.item');
  if (items[itemIdx]) items[itemIdx].remove();

  slides[selectedSlide] = slide.outerHTML;
  markDirty();
  renderSlideList();
  renderEditor();
  updatePreview();
}

function addItem(edIdx) {
  const container = document.getElementById('editorContent');
  const editables = container._editables;
  if (!editables || !editables[edIdx]) return;

  const ed = editables[edIdx];
  const parser = new DOMParser();
  const doc = parser.parseFromString(slides[selectedSlide], 'text/html');
  const slide = doc.querySelector('.slide');
  if (!slide) return;

  const itemsEl = slide.querySelector(ed.containerSelector);
  if (!itemsEl) return;

  const newItem = doc.createElement('div');
  newItem.className = 'item';
  newItem.innerHTML = '<h3>New Item</h3><p>Description here.</p>';
  itemsEl.appendChild(newItem);

  slides[selectedSlide] = slide.outerHTML;
  markDirty();
  renderSlideList();
  renderEditor();
  updatePreview();
}

function updateRawHtml(value) {
  slides[selectedSlide] = value;
  markDirty();
  renderThumb(selectedSlide);
  updatePreview();
}

// ─── Preview ───
function updatePreview() {
  if (selectedSlide < 0 || !slides.length) return;
  const section = document.getElementById('previewSection');
  section.style.display = 'block';
  const iframe = document.getElementById('previewFrame');
  iframe.srcdoc = buildSlidePreviewHtml(selectedSlide);
  fitPreview();
}

function fitPreview() {
  const wrap = document.getElementById('previewWrap');
  const iframe = document.getElementById('previewFrame');
  if (!wrap || !iframe) return;
  const w = wrap.clientWidth;
  const scale = w / 1280;
  iframe.style.transform = `scale(${scale})`;
  wrap.style.height = (720 * scale) + 'px';
}

let previewVisible = true;
function togglePreview() {
  previewVisible = !previewVisible;
  document.getElementById('previewWrap').style.display = previewVisible ? 'block' : 'none';
  document.querySelector('.preview-toggle').textContent = previewVisible ? 'Preview ▾' : 'Preview ▸';
  if (previewVisible) fitPreview();
}

window.addEventListener('resize', fitPreview);

// ─── Helpers ───
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ─── Unsaved changes guard ───
window.addEventListener('beforeunload', (e) => {
  if (dirty) {
    e.preventDefault();
  }
});

// ─── Keyboard shortcuts ───
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    saveFile();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'o') {
    e.preventDefault();
    openFileModal();
  }
});
</script>
